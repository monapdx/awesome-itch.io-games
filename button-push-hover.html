
<style type="text/css">
.itch-button {
  position: relative;
  display: inline-block;
  width: 744px; /* match your image width */
  max-width: 100%;
}

.itch-button .button-img {
  display: block;
  width: 100%;
  height: auto;
}

.itch-button .pushed {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 140ms ease-in-out;
}

.itch-button:hover .pushed,
.itch-button:focus-visible .pushed {
  opacity: 1;
}

</style>


<a class="itch-button" href="https://yourgame.itch.io/your-game">
  <img src="https://raw.githubusercontent.com/monapdx/awesome-itch.io-games/refs/heads/main/button.png" alt="Available on itch.io" class="button-img normal">
  <img src="https://raw.githubusercontent.com/monapdx/awesome-itch.io-games/refs/heads/main/button-pushed.png" alt="" class="button-img pushed" aria-hidden="true">
</a>
